<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="display:flex;background:#FFFFFF;border-top:1px solid #EFE7DD;padding:9px 6px 11px;font-family:'Plus Jakarta Sans',sans-serif;">
  <sc-for list="{{ items }}" as="it" hint-placeholder-count="5">
    <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;min-height:48px;justify-content:center;">
      <svg width="23" height="23" viewBox="0 0 24 24" fill="none" stroke="{{ it.color }}" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="{{ it.path }}"></path></svg>
      <span style="font-size:11px;letter-spacing:.1px;color:{{ it.color }};font-weight:{{ it.weight }};">{{ it.label }}</span>
    </div>
  </sc-for>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:390,&quot;height&quot;:64},&quot;active&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;Dashboard&quot;,&quot;Penjualan&quot;,&quot;Bahan&quot;,&quot;Laporan&quot;,&quot;Lainnya&quot;],&quot;default&quot;:&quot;Penjualan&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const active = this.props.active || 'Penjualan';
    const items = [
      { label: 'Dashboard', path: 'M3 10.5 12 3l9 7.5M5 9.5V20h5v-6h4v6h5V9.5' },
      { label: 'Penjualan', path: 'M3 4h2l2.2 11.2A1 1 0 0 0 8.2 16h8.8a1 1 0 0 0 1-.8L20 7H6M9 20a1 1 0 1 0 .001 0M16 20a1 1 0 1 0 .001 0' },
      { label: 'Bahan', path: 'M21 8 12 3 3 8v8l9 5 9-5zM3 8l9 5 9-5M12 13v8' },
      { label: 'Laporan', path: 'M5 21V10M12 21V4M19 21v-7M3 21h18' },
      { label: 'Lainnya', path: 'M5 12h.01M12 12h.01M19 12h.01' },
    ].map(it => ({
      ...it,
      color: it.label === active ? '#C75C3C' : '#AAA095',
      weight: it.label === active ? 700 : 500,
    }));
    return { items };
  }
}
</script>
</body>
</html>
